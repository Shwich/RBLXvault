<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;--accent:#6ee7b7;--accent2:#f472b6;--accent3:#a78bfa;--text:#f0eff4;--muted:#6b6a7a;--tag-bg:#1e1e2e}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
h1{font-size:2rem;font-weight:800;letter-spacing:-0.04em}
.accent-dot{color:var(--accent);font-size:2.5rem;line-height:0.6}
.header{padding:2rem 1.5rem 1rem;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:flex-end;gap:1rem;flex-wrap:wrap}
.tagline{font-size:0.75rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:0.4rem}
.search-wrap{padding:1rem 1.5rem 0}
.search{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:0.5rem 0.75rem;font-family:'IBM Plex Mono',monospace;font-size:0.8rem;width:100%;outline:none;transition:border-color 0.15s}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--muted)}
.filters{padding:1rem 1.5rem;display:flex;flex-wrap:wrap;gap:0.5rem;border-bottom:1px solid var(--border)}
.filter-label{font-size:0.65rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;align-self:center;margin-right:0.25rem}
.filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:2rem;padding:0.35rem 0.9rem;font-size:0.75rem;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.15s;font-weight:500}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#0d0d0f;border-color:var(--accent);font-weight:700}
.count{font-size:0.7rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;padding:0.75rem 1.5rem;border-bottom:1px solid var(--border)}
.count span{color:var(--accent);font-weight:500}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;background:var(--border)}
.card{background:var(--surface);padding:1.25rem;cursor:pointer;transition:background 0.15s;display:flex;flex-direction:column;gap:0.6rem;position:relative;overflow:hidden}
.card:hover{background:var(--surface2)}
.card-emoji{font-size:2.2rem;line-height:1}
.card-name{font-size:1rem;font-weight:700;letter-spacing:-0.02em}
.card-desc{font-size:0.78rem;color:var(--muted);line-height:1.5;font-family:'IBM Plex Mono',monospace}
.card-tags{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:auto;padding-top:0.4rem}
.tag{font-size:0.65rem;font-family:'IBM Plex Mono',monospace;padding:0.2rem 0.5rem;border-radius:2px;background:var(--tag-bg);border:1px solid var(--border)}
.tag.genre{color:var(--accent3);border-color:#a78bfa30}
.tag.vibe{color:var(--accent);border-color:#6ee7b730}
.tag.social{color:var(--accent2);border-color:#f472b630}
.players{font-size:0.7rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:0.3rem}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.empty{padding:3rem 1.5rem;text-align:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.85rem;grid-column:1/-1}
.new-badge{position:absolute;top:0.75rem;right:0.75rem;background:var(--accent2);color:#0d0d0f;font-size:0.6rem;font-weight:700;font-family:'IBM Plex Mono',monospace;padding:0.15rem 0.4rem;border-radius:2px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;z-index:10}
.modal-close:hover{color:var(--text);border-color:var(--text)}
.modal-header{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;gap:1.25rem;align-items:flex-start}
.modal-icon{font-size:4rem;line-height:1;flex-shrink:0;background:var(--surface2);width:80px;height:80px;border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.modal-meta{flex:1;min-width:0}
.modal-title{font-size:1.4rem;font-weight:800;letter-spacing:-0.03em;line-height:1.1;margin-bottom:0.4rem}
.modal-dev{font-size:0.72rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-bottom:0.6rem}
.modal-players{font-size:0.75rem;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:0.4rem;color:var(--accent)}
.modal-body{padding:1.5rem}
.modal-desc-label{font-size:0.65rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.5rem}
.modal-desc{font-size:0.85rem;color:var(--text);line-height:1.7;font-family:'IBM Plex Mono',monospace;opacity:0.85;margin-bottom:1.25rem}
.modal-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.5rem}
.modal-tag{font-size:0.7rem;font-family:'IBM Plex Mono',monospace;padding:0.3rem 0.7rem;border-radius:3px;background:var(--tag-bg);border:1px solid var(--border)}
.modal-tag.genre{color:var(--accent3);border-color:#a78bfa30}
.modal-tag.vibe{color:var(--accent);border-color:#6ee7b730}
.modal-tag.social{color:var(--accent2);border-color:#f472b630}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:1.5rem}
.stat{background:var(--surface2);padding:0.75rem 1rem}
.stat-label{font-size:0.65rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-bottom:0.2rem}
.stat-val{font-size:0.9rem;font-weight:700;color:var(--text)}
.modal-play{width:100%;padding:0.75rem;background:var(--accent);color:#0d0d0f;border:none;border-radius:4px;font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:opacity 0.15s;letter-spacing:-0.01em}
.modal-play:hover{opacity:0.85}
.modal-more{width:100%;padding:0.6rem;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:4px;font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.15s;margin-top:0.5rem}
.modal-more:hover{color:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>
<div class="header">
  <div class="header-top"><h1>ROBLOX<span class="accent-dot">·</span>VAULT</h1></div>
  <p class="tagline">// find your next obsession. no robux required.</p>
</div>
<div class="search-wrap">
  <input class="search" type="text" id="search" placeholder="search games...">
</div>
<div class="filters" id="filters">
  <span class="filter-label">genre:</span>
  <button class="filter-btn active" data-filter="all">all</button>
  <button class="filter-btn" data-filter="obby">obby</button>
  <button class="filter-btn" data-filter="tycoon">tycoon</button>
  <button class="filter-btn" data-filter="roleplay">roleplay</button>
  <button class="filter-btn" data-filter="pvp">pvp</button>
  <button class="filter-btn" data-filter="horror">horror</button>
  <button class="filter-btn" data-filter="simulator">simulator</button>
  <button class="filter-btn" data-filter="adventure">adventure</button>
</div>
<div class="count" id="count">showing <span id="count-num">0</span> games</div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-header">
      <div class="modal-icon" id="modal-icon"></div>
      <div class="modal-meta">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-dev" id="modal-dev"></div>
        <div class="modal-players"><span class="dot"></span><span id="modal-players"></span> playing now</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-desc-label">about this game</div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <div class="modal-stats" id="modal-stats"></div>
      <button class="modal-play" id="modal-play">▶ play on roblox</button>
      <button class="modal-more" id="modal-more">ask claude about this game ↗</button>
    </div>
  </div>
</div>

<script>
const games=[
  {name:"Brookhaven RP",emoji:"🏠",desc:"Live your best suburban life. Or rob a bank. No judgement.",genre:"roleplay",vibe:"chill",social:"multiplayer",players:"527k",dev:"Wolfpaq & Obe",fullDesc:"Brookhaven RP is a massively multiplayer open-world sandbox where there are zero rules and infinite vibes. Buy a house, adopt a car, become a criminal, start a family — or just drive around being chaotic. No objectives. No win conditions. Just pure unfiltered roleplay with strangers on the internet.",visits:"27B+",rating:"93%",maxPlayers:"18",genre2:"Roleplay / Sandbox",url:"https://www.roblox.com/games/4924922222"},
  {name:"Tower of Hell",emoji:"⚡",desc:"A neon obby with no checkpoints. Pure suffering, beautifully designed.",genre:"obby",vibe:"rage",social:"solo",players:"89k",dev:"YXceptional Studios",fullDesc:"Tower of Hell drops you at the bottom of a randomly generated neon tower and dares you to reach the top — with absolutely no checkpoints. Every section is a different obstacle. You will fall. A lot. The tower changes every round so there's no memorising your way out. Just raw skill, rage, and the occasional miracle.",visits:"18B+",rating:"88%",maxPlayers:"24",genre2:"Obby / Parkour",url:"https://www.roblox.com/games/1962086868"},
  {name:"Adopt Me!",emoji:"🐾",desc:"Trade pets, build homes, flex your inventory on strangers.",genre:"roleplay",vibe:"chill",social:"trading",players:"412k",dev:"Uplift Games",fullDesc:"Adopt Me! started as a simple adoption roleplay and somehow became the most-played game in Roblox history. The real draw is the pet ecosystem — hatch eggs, raise pets, trade with other players, and accumulate a collection that other players will genuinely envy. Warning: the rare pet economy is surprisingly cutthroat.",visits:"34B+",rating:"91%",maxPlayers:"20",genre2:"Roleplay / Trading",url:"https://www.roblox.com/games/920587237"},
  {name:"Blox Fruits",emoji:"🍊",desc:"Eat cursed fruit, become ungodly powerful. Classic Roblox grind.",genre:"adventure",vibe:"grind",social:"multiplayer",players:"305k",dev:"Gamer Robot Inc.",fullDesc:"Inspired by One Piece, Blox Fruits lets you choose your path — master swordsman, powerful fruit user, martial artist, or gunslinger. Sail across seas, fight bosses, discover secrets, and work toward becoming the strongest player alive. It's one of the most content-packed games on the platform, and the grind is genuinely rewarding.",visits:"40B+",rating:"90%",maxPlayers:"20",genre2:"Action / Adventure RPG",url:"https://www.roblox.com/games/2753915549"},
  {name:"Murder Mystery 2",emoji:"🔪",desc:"One murderer, one sheriff, everyone else panicking. Good vibes.",genre:"pvp",vibe:"competitive",social:"multiplayer",players:"143k",dev:"Nikilis",fullDesc:"Up to 12 players. One murderer with a knife. One sheriff with a gun. Everyone else just trying not to die. The murderer has to eliminate everyone; the sheriff has to take them out first; innocents have to survive or figure out who's the killer. Rounds are short, chaotic, and intensely suspicious.",visits:"9B+",rating:"92%",maxPlayers:"12",genre2:"Social Deduction / Horror",url:"https://www.roblox.com/games/142823291"},
  {name:"Natural Disaster",emoji:"🌪️",desc:"Survive floods, earthquakes and tornadoes. Team chaos optional.",genre:"pvp",vibe:"casual",social:"multiplayer",players:"62k",dev:"Stickmasterluke",fullDesc:"One of Roblox's oldest and most beloved games. Each round, players are placed on an island and must survive a randomly selected natural disaster — tornado, flood, earthquake, acid rain, you name it. Simple premise, endlessly chaotic execution. The real disaster is usually other players getting in your way.",visits:"2B+",rating:"87%",maxPlayers:"30",genre2:"Survival / Action",url:"https://www.roblox.com/games/189707"},
  {name:"Work at a Pizza Place",emoji:"🍕",desc:"The original Roblox job sim. Someone always ignores their role.",genre:"simulator",vibe:"chill",social:"multiplayer",players:"31k",dev:"Dued1",fullDesc:"A Roblox classic that's been running since 2008. Players take on roles in a pizza restaurant — cashier, cook, delivery driver, supplier — and attempt to work as a team. In practice, half the server ignores their job and chaos reigns. Strangely fun. Weirdly nostalgic even if you've never played it before.",visits:"1B+",rating:"85%",maxPlayers:"20",genre2:"Simulator / Roleplay",url:"https://www.roblox.com/games/192800"},
  {name:"The Mimic",emoji:"👁️",desc:"Japanese horror, cryptic lore, and something always behind you.",genre:"horror",vibe:"scary",social:"solo",players:"48k",dev:"MUCDICH",fullDesc:"The Mimic is Roblox horror done properly. Rooted in Japanese folklore and urban legends, it delivers genuinely unsettling atmosphere, cryptic storytelling, and multiple chapters of escalating dread. The entity designs are creative and terrifying. Not for the faint-hearted, and absolutely not one to play with the lights off.",visits:"800M+",rating:"89%",maxPlayers:"6",genre2:"Horror / Story",url:"https://www.roblox.com/games/7355541193"},
  {name:"Jailbreak",emoji:"🚔",desc:"Escape prison, rob trains, get chased. The Roblox GTA experience.",genre:"tycoon",vibe:"competitive",social:"multiplayer",players:"198k",dev:"Badimo",fullDesc:"Play as a prisoner trying to escape and build a criminal empire, or a cop trying to stop them. Rob banks, trains, museums and jewellery stores. Buy faster cars. Get better weapons. Chase or be chased across a massive open world. It's basically Roblox GTA and it absolutely slaps.",visits:"7B+",rating:"91%",maxPlayers:"26",genre2:"Open World / Action",url:"https://www.roblox.com/games/606849621"},
  {name:"Obby But You're On a Bike",emoji:"🚲",desc:"Exactly what it says. Surprisingly hard. Surprisingly fun.",genre:"obby",vibe:"casual",social:"solo",players:"12k",dev:"Tomarty",fullDesc:"The name is the entire pitch. You ride a bike through an obstacle course. It sounds stupid. It is stupid. It's also way harder than it has any right to be, and you will spend an embarrassing amount of time on sections that look trivially easy. Highly recommended for a laugh.",visits:"300M+",rating:"84%",maxPlayers:"12",genre2:"Obby / Comedy",url:"https://www.roblox.com/games/5326455366"},
  {name:"Retail Tycoon 2",emoji:"🏪",desc:"Build a shop empire. Watch it fall apart. Rebuild. Repeat.",genre:"tycoon",vibe:"grind",social:"solo",players:"27k",dev:"Haggie125",fullDesc:"Design and manage your own retail store from scratch. Stock shelves, hire staff, expand your floor space, and optimise your layout for maximum profit. The progression is genuinely satisfying and there's a surprising amount of depth for what sounds like a simple tycoon game. One of the best in the genre.",visits:"600M+",rating:"90%",maxPlayers:"6",genre2:"Tycoon / Strategy",url:"https://www.roblox.com/games/5306068389"},
  {name:"Apeirophobia",emoji:"🌀",desc:"The backrooms, but make it Roblox. Liminal spaces hit different.",genre:"horror",vibe:"scary",social:"multiplayer",players:"35k",dev:"Polaroid Studios",fullDesc:"Apeirophobia is a backrooms-inspired horror experience with multiple levels, each with its own unsettling aesthetic and entity. The liminal space atmosphere is executed brilliantly — empty offices, fluorescent lighting, the feeling that something is very wrong even when nothing is visibly there. Genuinely creepy.",visits:"1B+",rating:"88%",maxPlayers:"10",genre2:"Horror / Backrooms",url:"https://www.roblox.com/games/6516141723"},
  {name:"Arsenal",emoji:"🎯",desc:"Fast-paced gun game. Every kill unlocks a new weapon. Chaotic.",genre:"pvp",vibe:"competitive",social:"multiplayer",players:"76k",dev:"ROLVe Community",fullDesc:"Arsenal is Roblox's answer to gun game mode. Every kill earns you a new weapon, cycling from assault rifles all the way down to a rubber duck — first to finish the rotation wins. Fast, frenetic, and accessible. It was the first FPS on Roblox to hit 1 billion visits, which tells you everything.",visits:"5B+",rating:"89%",maxPlayers:"20",genre2:"First-Person Shooter",url:"https://www.roblox.com/games/286090429"},
  {name:"Pet Simulator X",emoji:"🐶",desc:"Collect pets, hatch eggs, question how many hours you've spent.",genre:"simulator",vibe:"grind",social:"trading",players:"183k",dev:"BIG Games",fullDesc:"Hatch eggs. Get pets. Make them bigger. Trade them. Get rarer ones. Repeat until the heat death of the universe. Pet Simulator X is a masterclass in incremental gameplay — there's always a shinier pet just out of reach. The trading economy is enormous and strangely compelling.",visits:"14B+",rating:"87%",maxPlayers:"8",genre2:"Simulator / Trading",url:"https://www.roblox.com/games/6284583030"},
  {name:"Da Hood",emoji:"🌆",desc:"Street RP with PvP everywhere. Not for the faint of heart.",genre:"pvp",vibe:"competitive",social:"multiplayer",players:"94k",dev:"Da Hood Entertainment",fullDesc:"Da Hood is a street-themed roleplay game where PvP is everywhere and consequences are minimal. Rob people, fight rival crews, buy guns and cars, and try to establish dominance. It's loud, chaotic, and extremely online. Has its own entire subculture at this point. Approach with caution and good ping.",visits:"4B+",rating:"82%",maxPlayers:"25",genre2:"Roleplay / PvP",url:"https://www.roblox.com/games/2788229376"},
  {name:"Royale High",emoji:"👑",desc:"Fairy school, fashion, quests. The aesthetics are immaculate.",genre:"roleplay",vibe:"chill",social:"multiplayer",players:"88k",dev:"callmehbob",fullDesc:"A fantasy school roleplay with an emphasis on fashion, socialising, and exploration. Royale High has an absurdly detailed cosmetics system, seasonal events, and a surprisingly engaged community. The halo trading economy is its own entire thing. If aesthetics are your thing, this is the one.",visits:"8B+",rating:"90%",maxPlayers:"15",genre2:"Roleplay / Fashion",url:"https://www.roblox.com/games/735030788"},
  {name:"Doors",emoji:"🚪",desc:"Open doors. Something's in the hotel. Screaming is optional but expected.",genre:"horror",vibe:"scary",social:"multiplayer",players:"201k",dev:"LSPLASH & RediblesQW",fullDesc:"A first-person roguelite horror set in a massive hotel. Your goal: reach Door 100. Between you and it are 20 unique entities, puzzle rooms, hidden items, and the ever-present threat of Rush barrelling through the corridor. No two runs are the same thanks to procedural generation. Won Best Horror at the 2024 Roblox Innovation Awards.",visits:"3B+",rating:"93%",maxPlayers:"4",genre2:"Horror / Roguelite",url:"https://www.roblox.com/games/6516141723"},
  {name:"Anime Fighters",emoji:"⚔️",desc:"Grind through anime worlds, collect fighters, get unreasonably strong.",genre:"simulator",vibe:"grind",social:"multiplayer",players:"67k",dev:"Sulley",fullDesc:"Anime Fighters Simulator lets you collect powerful fighters from various anime universes and use them to auto-battle your way to absurd power levels. New worlds, limited events, and seasonal updates keep the meta constantly shifting. A solid pick if you like incremental progression wrapped in anime aesthetics.",visits:"2B+",rating:"85%",maxPlayers:"10",genre2:"Simulator / Anime",url:"https://www.roblox.com/games/6284583030"},
  {name:"Counterfeit Tycoon",emoji:"💵",desc:"Print fake money, dodge police raids, and rob your neighbours. Totally legal.",genre:"tycoon",vibe:"grind",social:"multiplayer",players:"18k",dev:"ShepDance",fullDesc:"Build an illegal counterfeit money printing empire from scratch. Start with a single dodgy printer and a dream, then scale up to a full operation with 200+ upgrades, multiple vehicles, and a proper armory. The twist? Armed police raid your base in waves like a tower defence game, and other players can straight up steal from you. Inspired by Lumber Tycoon 2 with a custom soundtrack. Genuinely one of the most original tycoon games on the platform.",visits:"50M+",rating:"88%",maxPlayers:"12",genre2:"Tycoon / Tower Defence",url:"https://www.roblox.com/games/128842186735092",isNew:true},
  {name:"Refinery Caves 2",emoji:"⛏️",desc:"Mine ores, chop trees, catch fish, build your base. Chill but deep.",genre:"adventure",vibe:"chill",social:"solo",players:"4k",dev:"Zik's Dev Team",fullDesc:"Refinery Caves 2 is an open-world survival sandbox set on a resource-rich island in the year 2045. Mine ores, chop trees, catch fish, and use an extended building system to improve your base however you like. Inspired by Lumber Tycoon 2, it's got a surprising amount of depth hidden under the relaxed surface — including cryptic lore about a Shadow Organisation hunting anomalies, if you're into that sort of thing.",visits:"15M+",rating:"86%",maxPlayers:"8",genre2:"Adventure / Sandbox",url:"https://www.roblox.com/games/12196278347",isNew:true},
];

let activeFilter='all',searchTerm='';

function render(){
  const grid=document.getElementById('grid');
  const filtered=games.filter(g=>{
    const matchGenre=activeFilter==='all'||g.genre===activeFilter;
    const matchSearch=!searchTerm||g.name.toLowerCase().includes(searchTerm)||g.genre.includes(searchTerm)||g.vibe.includes(searchTerm);
    return matchGenre&&matchSearch;
  });
  document.getElementById('count-num').textContent=filtered.length;
  if(!filtered.length){grid.innerHTML='<div class="empty">no games found. try different filters.</div>';return;}
  grid.innerHTML=filtered.map(g=>`
    <div class="card" onclick="openModal(${games.indexOf(g)})">
      ${g.isNew?'<div class="new-badge">NEW</div>':''}
      <div class="card-emoji">${g.emoji}</div>
      <div class="card-name">${g.name}</div>
      <div class="card-desc">${g.desc}</div>
      <div class="players"><span class="dot"></span>${g.players}</div>
      <div class="card-tags">
        <span class="tag genre">${g.genre}</span>
        <span class="tag vibe">${g.vibe}</span>
        <span class="tag social">${g.social}</span>
      </div>
    </div>
  `).join('');
}

function openModal(idx){
  const g=games[idx];
  document.getElementById('modal-icon').textContent=g.emoji;
  document.getElementById('modal-title').textContent=g.name;
  document.getElementById('modal-dev').textContent='by '+g.dev;
  document.getElementById('modal-players').textContent=g.players;
  document.getElementById('modal-desc').textContent=g.fullDesc;
  document.getElementById('modal-tags').innerHTML=`<span class="modal-tag genre">${g.genre2}</span><span class="modal-tag vibe">${g.vibe}</span><span class="modal-tag social">${g.social}</span>`;
  document.getElementById('modal-stats').innerHTML=`
    <div class="stat"><div class="stat-label">total visits</div><div class="stat-val">${g.visits}</div></div>
    <div class="stat"><div class="stat-label">rating</div><div class="stat-val">${g.rating}</div></div>
    <div class="stat"><div class="stat-label">max players</div><div class="stat-val">${g.maxPlayers}</div></div>
    <div class="stat"><div class="stat-label">genre</div><div class="stat-val">${g.genre}</div></div>
  `;
  document.getElementById('modal-play').onclick=()=>{window.openLink&&openLink(g.url)};
  document.getElementById('modal-more').onclick=()=>{sendPrompt('Tell me more about the Roblox game "'+g.name+'" — what makes it fun and who should play it?')};
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('modal-close').onclick=()=>document.getElementById('overlay').classList.remove('open');
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');});
document.getElementById('filters').addEventListener('click',e=>{
  if(!e.target.matches('.filter-btn'))return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter=e.target.dataset.filter;
  render();
});
document.getElementById('search').addEventListener('input',e=>{searchTerm=e.target.value.toLowerCase();render();});
render();
</script>
</body>
</html>
